<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NANDA Memory Fusion</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f5ef;
        color: #1f2933;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(880px, calc(100vw - 32px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 0 0 24px;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 28px;
      }

      a,
      button {
        border: 1px solid #1f2933;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2933;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 14px;
        text-decoration: none;
        font: inherit;
      }

      button {
        background: #1f2933;
        color: #ffffff;
      }

      pre {
        border: 1px solid #c7c0b2;
        border-radius: 6px;
        background: #ffffff;
        margin: 0;
        overflow: auto;
        padding: 18px;
        min-height: 220px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NANDA Memory Fusion</h1>
      <p>
        A small agent-facing memory service that accepts reports only when they legally fuse
        with a declared task basis, while ignoring irrelevant natural-language, code-shaped,
        and off-basis context.
      </p>
      <div class="actions">
        <a href="/skill.md">View SKILL.md</a>
        <a href="/api/health">Health</a>
        <a href="/api/examples">Example Payload</a>
        <button id="run-demo" type="button">Run Demo</button>
      </div>
      <pre id="output">Click Run Demo to call POST /api/fuse.</pre>
    </main>
    <script>
      const demoPayload = {
        node: "calculator",
        basis: ["add", "subtract", "multiply", "divide"],
        threshold: 4,
        reports: [
          { id: "r1", node: "calculator", basis: "add", delta: 1 },
          { id: "r2", node: "calculator", basis: "subtract", delta: 1 },
          { id: "r3", node: "calculator", basis: "multiply", delta: 1 },
          { id: "r4", node: "calculator", basis: "divide", delta: 1 },
          { id: "alice", text: "Alice was beginning to get very tired..." },
          { id: "gpu", text: "amdgpu_bo_placement_from_domain(...)" },
          { id: "off", node: "calculator", basis: "horoscope", delta: 99 }
        ]
      };

      document.querySelector("#run-demo").addEventListener("click", async () => {
        const output = document.querySelector("#output");
        output.textContent = "Calling /api/fuse...";
        const response = await fetch("/api/fuse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(demoPayload)
        });
        output.textContent = JSON.stringify(await response.json(), null, 2);
      });
    </script>
  </body>
</html>
